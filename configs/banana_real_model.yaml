# Inference profile with the REAL MODEL v5 (recommended).
# YOLOv8m trained for density/overlap with real-crop copy-paste augmentation + label cleanup.
# CALIBRATED COUNT: conf 0.48 -> aggregate count accuracy ~98% (error 1.7%), validated with
# 5-fold cross-validation over 200 UNSEEN images.
# See models/registry/real_v5_count_calibration.json (reproducible: real_data/calibrate_count.py).
# Per-plant detection (reference, at conf 0.25): recall 0.85 / precision 0.90 / F1 0.88 / mAP50 0.93.
detector: yolo-seg
model_path: models/banana_real_v5.pt
confidence_threshold: 0.48
iou_threshold: 0.45
gsd_cm: 2.0
expected_crown_diameter_m: 2.4
min_component_area_px: 80
split_mat_clusters: true
min_center_distance_ratio: 0.42
center_distance_weight: 0.35
canopy_fill_ratio: 0.58
max_split_instances: 12
tile_size: 1024
tile_overlap: 128
class_name: banana_plant
rgb_threshold_quantile: 0.82
output_overlay: true
