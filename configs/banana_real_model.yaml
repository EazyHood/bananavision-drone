# Perfil de inferencia con el MODELO REAL v3 (recomendado).
# YOLOv8m reentrenado para densidad/traslape (imgsz 1024, copy_paste/mixup, box loss alta).
# CONTEO CALIBRADO: conf 0.44 -> acierto de conteo agregado ~98% (error 2.0%), validado con
# validacion cruzada de 5 folds sobre 200 imagenes NO vistas.
# Ver models/registry/real_v3_count_calibration.json (reproducible: real_data/calibrate_count.py).
# Deteccion por planta (referencia, a conf 0.25): recall 0.80 / precision 0.82 / F1 0.81 / mAP50 0.92.
detector: yolo-seg
model_path: models/banana_real_v3.pt
confidence_threshold: 0.44
iou_threshold: 0.45
gsd_cm: 2.0
expected_crown_diameter_m: 2.4
min_component_area_px: 80
split_mat_clusters: true
min_center_distance_ratio: 0.42
center_distance_weight: 0.35
canopy_fill_ratio: 0.58
max_split_instances: 12
tile_size: 1024
tile_overlap: 128
class_name: banana_plant
rgb_threshold_quantile: 0.82
output_overlay: true
